services:
  - type: web
    name: milking-backend
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: milking-backend-db
          property: internalConnectionString
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: milking-backend-db
    plan: free
    databaseName: milking_backend
    user: milking_backend_user
